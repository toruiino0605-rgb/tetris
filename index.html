<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russian Mosque Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            overflow: hidden;
            background: #0a0a1a;
        }

        /* 背景画像とオーバーレイ */
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/bg-mosque-russia.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.6);
            z-index: 1;
        }

        /* メインコンテナ */
        #game-container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 30px;
        }

        /* ガラス風UIパネル */
        .glass-panel {
            background: rgba(15, 30, 60, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(218, 165, 32, 0.3);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* ゲーム盤面 */
        #game-board {
            position: relative;
        }

        #canvas {
            border: 3px solid rgba(64, 224, 208, 0.5);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(64, 224, 208, 0.3);
        }

        /* サイドパネル */
        #side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 200px;
        }

        .info-box {
            background: rgba(15, 30, 60, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(218, 165, 32, 0.4);
            border-radius: 10px;
            padding: 15px;
            color: #daa520;
            text-align: center;
        }

        .info-box h3 {
            font-size: 14px;
            color: #40e0d0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .info-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #daa520;
            text-shadow: 0 0 10px rgba(218, 165, 32, 0.5);
        }

        /* プレビューキャンバス */
        .preview-canvas {
            margin: 10px auto;
            display: block;
            border: 1px solid rgba(64, 224, 208, 0.3);
            border-radius: 5px;
        }

        /* コントロールボタン */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background: linear-gradient(135deg, rgba(218, 165, 32, 0.3), rgba(64, 224, 208, 0.3));
            border: 2px solid rgba(218, 165, 32, 0.5);
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(135deg, rgba(218, 165, 32, 0.5), rgba(64, 224, 208, 0.5));
            box-shadow: 0 0 15px rgba(218, 165, 32, 0.6);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* 音量コントロール */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #40e0d0;
        }

        /* スタート画面 */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 30px;
        }

        #start-screen h1 {
            font-size: 48px;
            color: #daa520;
            text-shadow: 0 0 30px rgba(218, 165, 32, 0.8);
            letter-spacing: 4px;
        }

        #start-screen .subtitle {
            font-size: 18px;
            color: #40e0d0;
            letter-spacing: 2px;
        }

        #start-btn {
            font-size: 18px;
            padding: 20px 50px;
            background: linear-gradient(135deg, #daa520, #40e0d0);
            border: 3px solid #fff;
        }

        /* ゲームオーバー画面 */
        #game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            text-align: center;
            background: rgba(15, 30, 60, 0.95);
            backdrop-filter: blur(15px);
            border: 3px solid #daa520;
            border-radius: 20px;
            padding: 40px 60px;
        }

        #game-over h2 {
            font-size: 36px;
            color: #ff6b6b;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        #game-over .final-score {
            font-size: 24px;
            color: #daa520;
            margin-bottom: 30px;
        }

        /* 操作ガイド */
        .controls-guide {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.8;
        }

        .controls-guide strong {
            color: #40e0d0;
        }

        /* ========================================
           モバイル・iPhone対応
        ======================================== */
        /* iOSのSafariのアドレスバーを考慮 */
        @supports (-webkit-touch-callout: none) {
            body {
                height: -webkit-fill-available;
            }
        }

        /* タッチコントロールパッド */
        #touch-controls {
            display: none;
            width: 100%;
            padding: 6px 10px 8px;
            background: rgba(5, 10, 30, 0.9);
            border-top: 1px solid rgba(64, 224, 208, 0.3);
            flex-shrink: 0;
        }

        .touch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .touch-row:last-child { margin-bottom: 0; }

        .touch-btn {
            flex: 1;
            background: rgba(64, 224, 208, 0.15);
            border: 1.5px solid rgba(64, 224, 208, 0.4);
            border-radius: 10px;
            color: #40e0d0;
            font-size: 18px;
            font-weight: bold;
            padding: 0;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        .touch-btn:active {
            background: rgba(64, 224, 208, 0.4);
            border-color: rgba(64, 224, 208, 0.8);
            transform: scale(0.95);
        }

        .touch-btn.btn-drop {
            background: rgba(218, 165, 32, 0.2);
            border-color: rgba(218, 165, 32, 0.5);
            color: #daa520;
            flex: 2;
        }
        .touch-btn.btn-drop:active { background: rgba(218, 165, 32, 0.5); }

        .touch-btn.btn-hold {
            background: rgba(147, 112, 219, 0.2);
            border-color: rgba(147, 112, 219, 0.5);
            color: #9370db;
        }
        .touch-btn.btn-hold:active { background: rgba(147, 112, 219, 0.5); }

        .touch-btn.btn-pause {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.4);
            color: #ff6b6b;
            font-size: 12px;
        }

        /* モバイル時: body全体をflexの縦並びにして確実に収める */
        @media (max-width: 768px) {
            html, body {
                height: 100%;
                height: -webkit-fill-available;
                overflow: hidden;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            #touch-controls {
                display: flex;
                flex-direction: column;
                /* 固定位置ではなくフロー内に配置 */
                position: static;
            }

            /* ゲームコンテナ: 残りの高さを全部使う */
            #game-container {
                flex: 1;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                gap: 6px;
                padding: 6px 8px 4px;
                height: auto;
                min-height: 0;
                overflow: hidden;
            }

            #game-board {
                padding: 6px;
                flex-shrink: 0;
            }

            #canvas {
                display: block;
            }

            /* サイドパネル: 横並びでスコア・レベル・ライン・Next・Holdを表示 */
            #side-panel {
                flex-direction: row;
                flex-wrap: nowrap;
                width: 100%;
                max-width: 420px;
                gap: 5px;
                flex-shrink: 0;
            }

            .info-box {
                flex: 1;
                min-width: 0;
                padding: 5px 3px;
            }

            .info-box h3 {
                font-size: 9px;
                margin-bottom: 2px;
                letter-spacing: 0;
            }

            .info-box .value {
                font-size: 15px;
            }

            /* NEXTとHOLDのキャンバス */
            #next-canvas, #hold-canvas {
                width: 50px !important;
                height: 50px !important;
                margin: 2px auto !important;
            }

            /* サイドパネルのボタン類は非表示 */
            #side-panel .controls {
                display: none;
            }

            /* 背景・オーバーレイは固定のまま */
            #background, #overlay {
                position: fixed;
            }

            #start-screen h1 { font-size: 30px; }
            #start-screen .subtitle { font-size: 13px; }
            #start-btn { font-size: 15px; padding: 14px 35px; }
            .controls-guide { font-size: 11px; text-align: center; padding: 0 20px; }
        }

        /* 小さいiPhone (SE等) */
        @media (max-width: 380px) {
            .touch-btn { height: 42px; font-size: 16px; }
            #touch-controls { padding: 5px 8px 6px; }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div id="background"></div>
    <div id="overlay"></div>

    <!-- スタート画面 -->
    <div id="start-screen">
        <h1>RUSSIAN TETRIS</h1>
        <p class="subtitle">~ Mosque Night ~</p>
        <button id="start-btn">START GAME</button>
        <div class="controls-guide">
            <strong>← →</strong> Move | <strong>↓</strong> Soft Drop | <strong>Space</strong> Hard Drop<br>
            <strong>↑ / X</strong> Rotate Right | <strong>Z</strong> Rotate Left | <strong>C</strong> Hold<br>
            📱 <strong>Mobile:</strong> On-screen buttons below the game
        </div>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="game-over">
        <h2>GAME OVER</h2>
        <div class="final-score">Score: <span id="final-score-value">0</span></div>
        <button onclick="restartGame()">RESTART</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-container" style="display: none;">
        <!-- メインボード -->
        <div id="game-board" class="glass-panel">
            <canvas id="canvas" width="300" height="600"></canvas>
        </div>

        <!-- サイドパネル -->
        <div id="side-panel">
            <!-- スコア -->
            <div class="info-box">
                <h3>Score</h3>
                <div class="value" id="score">0</div>
            </div>

            <!-- レベル -->
            <div class="info-box">
                <h3>Level</h3>
                <div class="value" id="level">1</div>
            </div>

            <!-- ライン数 -->
            <div class="info-box">
                <h3>Lines</h3>
                <div class="value" id="lines">0</div>
            </div>

            <!-- NEXT -->
            <div class="info-box">
                <h3>Next</h3>
                <canvas id="next-canvas" class="preview-canvas" width="100" height="100"></canvas>
            </div>

            <!-- HOLD -->
            <div class="info-box">
                <h3>Hold</h3>
                <canvas id="hold-canvas" class="preview-canvas" width="100" height="100"></canvas>
            </div>

            <!-- コントロール -->
            <div class="controls glass-panel">
                <button onclick="togglePause()">PAUSE (P)</button>
                <button onclick="restartGame()">RESTART (R)</button>
                <button onclick="toggleMute()">🔊 <span id="mute-text">MUTE</span></button>
                <div class="volume-control">
                    <span style="color: #40e0d0;">Vol:</span>
                    <input type="range" id="volume" min="0" max="100" value="50" oninput="changeVolume(this.value)">
                </div>
            </div>
        </div>
    </div>

    <!-- タッチコントロール（モバイル用） -->
    <div id="touch-controls">
        <!-- HOLDピース表示 + ユーティリティ -->
        <div class="touch-row">
            <div id="mobile-hold-box" style="display:flex;align-items:center;gap:6px;flex:1;">
                <div style="color:#9370db;font-size:10px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;line-height:1.2;">HOLD</div>
                <canvas id="mobile-hold-canvas" width="44" height="44" style="border:1px solid rgba(147,112,219,0.5);border-radius:5px;background:rgba(0,0,20,0.6);"></canvas>
            </div>
            <div id="mobile-info" style="display:flex;gap:6px;flex:2;justify-content:flex-end;">
                <div style="text-align:center;">
                    <div style="color:#40e0d0;font-size:9px;letter-spacing:1px;">SCORE</div>
                    <div id="mobile-score" style="color:#daa520;font-size:14px;font-weight:bold;">0</div>
                </div>
                <div style="text-align:center;">
                    <div style="color:#40e0d0;font-size:9px;letter-spacing:1px;">LV</div>
                    <div id="mobile-level" style="color:#daa520;font-size:14px;font-weight:bold;">1</div>
                </div>
                <div style="text-align:center;">
                    <div style="color:#40e0d0;font-size:9px;letter-spacing:1px;">LINES</div>
                    <div id="mobile-lines" style="color:#daa520;font-size:14px;font-weight:bold;">0</div>
                </div>
                <div style="text-align:center;">
                    <div style="color:#40e0d0;font-size:9px;letter-spacing:1px;">NEXT</div>
                    <canvas id="mobile-next-canvas" width="44" height="44" style="border:1px solid rgba(64,224,208,0.4);border-radius:5px;background:rgba(0,0,20,0.6);"></canvas>
                </div>
            </div>
            <button class="touch-btn btn-pause" style="flex:0 0 64px;" ontouchstart="touchAction('pause')" ontouchend="touchEnd(event)">⏸<br><span style="font-size:9px;">PAUSE</span></button>
        </div>
        <!-- 操作ボタン -->
        <div class="touch-row">
            <button class="touch-btn btn-hold" ontouchstart="touchAction('hold')" ontouchend="touchEnd(event)">HOLD</button>
            <button class="touch-btn" ontouchstart="startRepeat('left')" ontouchend="stopRepeat()">◀</button>
            <button class="touch-btn" ontouchstart="touchAction('rotateL')" ontouchend="touchEnd(event)">↺</button>
            <button class="touch-btn" ontouchstart="startRepeat('down')" ontouchend="stopRepeat()">▼</button>
            <button class="touch-btn" ontouchstart="touchAction('rotateR')" ontouchend="touchEnd(event)">↻</button>
            <button class="touch-btn" ontouchstart="startRepeat('right')" ontouchend="stopRepeat()">▶</button>
            <button class="touch-btn btn-drop" style="flex:1.2;" ontouchstart="touchAction('hardDrop')" ontouchend="touchEnd(event)">⬇DROP</button>
        </div>
    </div>
    <audio id="bgm" loop>
        <source src="assets/korobeiniki.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========================================
        // グローバル変数
        // ========================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-canvas');
        const nextCtx = nextCanvas.getContext('2d');
        const holdCanvas = document.getElementById('hold-canvas');
        const holdCtx = holdCanvas.getContext('2d');
        const bgm = document.getElementById('bgm');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        let board = [];
        let score = 0;
        let lines = 0;
        let level = 1;
        let gameOver = false;
        let paused = false;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let currentPiece = null;
        let nextPiece = null;
        let holdPiece = null;
        let canHold = true;

        // ========================================
        // テトリミノの定義
        // ========================================
        const PIECES = {
            'I': {
                shape: [[1,1,1,1]],
                color: '#40e0d0' // ターコイズ
            },
            'O': {
                shape: [[1,1],[1,1]],
                color: '#daa520' // ゴールド
            },
            'T': {
                shape: [[0,1,0],[1,1,1]],
                color: '#9370db' // ディープパープル
            },
            'S': {
                shape: [[0,1,1],[1,1,0]],
                color: '#4169e1' // ロイヤルブルー
            },
            'Z': {
                shape: [[1,1,0],[0,1,1]],
                color: '#ff6b6b' // コーラルレッド
            },
            'J': {
                shape: [[1,0,0],[1,1,1]],
                color: '#1e90ff' // ドッジャーブルー
            },
            'L': {
                shape: [[0,0,1],[1,1,1]],
                color: '#ffa500' // オレンジ
            }
        };

        const PIECE_NAMES = Object.keys(PIECES);

        // ========================================
        // 初期化
        // ========================================
        function init() {
            // ボードを空で初期化
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            level = 1;
            gameOver = false;
            paused = false;
            canHold = true;
            holdPiece = null;

            currentPiece = createPiece();
            nextPiece = createPiece();

            updateDisplay();
            drawBoard();
            drawPiece();
            drawNext();
            drawHold();
        }

        // ========================================
        // ピース生成
        // ========================================
        function createPiece() {
            const name = PIECE_NAMES[Math.floor(Math.random() * PIECE_NAMES.length)];
            const piece = PIECES[name];
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(COLS / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0,
                name: name
            };
        }


        // ========================================
        // 現在のピース描画
        // ========================================
        function drawPiece() {
            if (!currentPiece) return;
            
            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        drawBlock(currentPiece.x + dx, currentPiece.y + dy, currentPiece.color);
                    }
                });
            });
        }

        // ========================================
        // NEXT描画
        // ========================================
        function drawNext() {
            nextCtx.fillStyle = 'rgba(0, 0, 20, 0.5)';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (!nextPiece) return;

            const offsetX = (nextCanvas.width - nextPiece.shape[0].length * 20) / 2;
            const offsetY = (nextCanvas.height - nextPiece.shape.length * 20) / 2;

            nextPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.fillRect(offsetX + dx * 20, offsetY + dy * 20, 20, 20);
                        nextCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                        nextCtx.strokeRect(offsetX + dx * 20, offsetY + dy * 20, 20, 20);
                    }
                });
            });

            // モバイル用
            const mc = document.getElementById('mobile-next-canvas');
            if (mc) {
                const mCtx = mc.getContext('2d');
                const bs = Math.floor(Math.min(mc.width, mc.height) / Math.max(nextPiece.shape[0].length, nextPiece.shape.length));
                const ox = (mc.width - nextPiece.shape[0].length * bs) / 2;
                const oy = (mc.height - nextPiece.shape.length * bs) / 2;
                mCtx.fillStyle = 'rgba(0,0,20,0.6)';
                mCtx.fillRect(0, 0, mc.width, mc.height);
                nextPiece.shape.forEach((row, dy) => {
                    row.forEach((value, dx) => {
                        if (value) {
                            mCtx.fillStyle = nextPiece.color;
                            mCtx.fillRect(ox + dx * bs, oy + dy * bs, bs - 1, bs - 1);
                        }
                    });
                });
            }
        }

        // ========================================
        // HOLD描画
        // ========================================
        function drawHold() {
            holdCtx.fillStyle = 'rgba(0, 0, 20, 0.5)';
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);

            if (!holdPiece) {
                // モバイル用もクリア
                const mc = document.getElementById('mobile-hold-canvas');
                if (mc) { const mCtx = mc.getContext('2d'); mCtx.fillStyle='rgba(0,0,20,0.6)'; mCtx.fillRect(0,0,mc.width,mc.height); }
                return;
            }

            const piece = PIECES[holdPiece];
            const offsetX = (holdCanvas.width - piece.shape[0].length * 20) / 2;
            const offsetY = (holdCanvas.height - piece.shape.length * 20) / 2;

            piece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        holdCtx.fillStyle = piece.color;
                        holdCtx.fillRect(offsetX + dx * 20, offsetY + dy * 20, 20, 20);
                        holdCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                        holdCtx.strokeRect(offsetX + dx * 20, offsetY + dy * 20, 20, 20);
                    }
                });
            });

            // モバイル用
            const mc = document.getElementById('mobile-hold-canvas');
            if (mc) {
                const mCtx = mc.getContext('2d');
                const bs = Math.floor(Math.min(mc.width, mc.height) / Math.max(piece.shape[0].length, piece.shape.length));
                const ox = (mc.width - piece.shape[0].length * bs) / 2;
                const oy = (mc.height - piece.shape.length * bs) / 2;
                mCtx.fillStyle = 'rgba(0,0,20,0.6)';
                mCtx.fillRect(0, 0, mc.width, mc.height);
                piece.shape.forEach((row, dy) => {
                    row.forEach((value, dx) => {
                        if (value) {
                            mCtx.fillStyle = piece.color;
                            mCtx.fillRect(ox + dx * bs, oy + dy * bs, bs - 1, bs - 1);
                        }
                    });
                });
            }
        }

        // ========================================
        // 衝突判定
        // ========================================
        function collides(piece, offsetX = 0, offsetY = 0) {
            for (let dy = 0; dy < piece.shape.length; dy++) {
                for (let dx = 0; dx < piece.shape[dy].length; dx++) {
                    if (piece.shape[dy][dx]) {
                        const newX = piece.x + dx + offsetX;
                        const newY = piece.y + dy + offsetY;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // ========================================
        // ピースの移動
        // ========================================
        function move(dir) {
            if (gameOver || paused) return;
            
            if (!collides(currentPiece, dir, 0)) {
                currentPiece.x += dir;
                render();
            }
        }

        function moveDown() {
            if (gameOver || paused) return;
            
            if (!collides(currentPiece, 0, 1)) {
                currentPiece.y++;
                render();
            } else {
                merge();
            }
        }

        function hardDrop() {
            if (gameOver || paused) return;
            
            while (!collides(currentPiece, 0, 1)) {
                currentPiece.y++;
            }
            merge();
            render();
        }

        // ========================================
        // 回転
        // ========================================
        function rotate(dir = 1) {
            if (gameOver || paused) return;
            
            const oldShape = currentPiece.shape;
            const newShape = rotateMatrix(oldShape, dir);
            currentPiece.shape = newShape;

            // 壁蹴り
            let offset = 0;
            while (collides(currentPiece, offset, 0) && offset < currentPiece.shape[0].length) {
                offset = offset > 0 ? -offset : -offset + 1;
            }

            if (collides(currentPiece, offset, 0)) {
                currentPiece.shape = oldShape; // 回転不可
            } else {
                currentPiece.x += offset;
            }
            render();
        }

        function rotateMatrix(matrix, dir = 1) {
            const N = matrix.length;
            const M = matrix[0].length;
            
            if (dir === 1) { // 右回転
                const rotated = Array.from({ length: M }, () => Array(N).fill(0));
                for (let row = 0; row < N; row++) {
                    for (let col = 0; col < M; col++) {
                        rotated[col][N - 1 - row] = matrix[row][col];
                    }
                }
                return rotated;
            } else { // 左回転
                const rotated = Array.from({ length: M }, () => Array(N).fill(0));
                for (let row = 0; row < N; row++) {
                    for (let col = 0; col < M; col++) {
                        rotated[M - 1 - col][row] = matrix[row][col];
                    }
                }
                return rotated;
            }
        }

        // ========================================
        // ホールド機能
        // ========================================
        function hold() {
            if (gameOver || paused || !canHold) return;

            if (holdPiece === null) {
                holdPiece = currentPiece.name;
                currentPiece = nextPiece;
                nextPiece = createPiece();
            } else {
                const temp = holdPiece;
                holdPiece = currentPiece.name;
                currentPiece = createPiece();
                currentPiece.name = temp;
                const piece = PIECES[temp];
                currentPiece.shape = piece.shape;
                currentPiece.color = piece.color;
            }

            currentPiece.x = Math.floor(COLS / 2) - Math.floor(currentPiece.shape[0].length / 2);
            currentPiece.y = 0;
            canHold = false;

            drawHold();
            render();
        }

        // ========================================
        // ピースを盤面に固定
        // ========================================
        function merge() {
            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        const y = currentPiece.y + dy;
                        const x = currentPiece.x + dx;
                        if (y >= 0) {
                            board[y][x] = currentPiece.color;
                        }
                    }
                });
            });

            clearLines();
            currentPiece = nextPiece;
            nextPiece = createPiece();
            canHold = true;

            if (collides(currentPiece, 0, 0)) {
                endGame();
            }

            drawNext();
        }

        // ========================================
        // ライン消去
        // ========================================
        function clearLines() {
            let linesCleared = 0;

            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row].every(cell => cell !== 0)) {
                    board.splice(row, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    row++; // 同じ行を再チェック
                }
            }

            if (linesCleared > 0) {
                lines += linesCleared;
                score += [0, 100, 300, 500, 800][linesCleared] * level;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 50);
                updateDisplay();
            }
        }

        // ========================================
        // ディスプレイ更新
        // ========================================
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
            // モバイル用
            const ms = document.getElementById('mobile-score');
            const ml = document.getElementById('mobile-level');
            const mli = document.getElementById('mobile-lines');
            if (ms) ms.textContent = score;
            if (ml) ml.textContent = level;
            if (mli) mli.textContent = lines;
        }

        // ========================================
        // レンダリング
        // ========================================
        function render() {
            drawBoard();
            drawPiece();
        }

        // ========================================
        // ゲームループ
        // ========================================
        function update(time = 0) {
            if (gameOver || paused) {
                requestAnimationFrame(update);
                return;
            }

            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;

            if (dropCounter > dropInterval) {
                moveDown();
                dropCounter = 0;
            }

            requestAnimationFrame(update);
        }

        // ========================================
        // ゲーム終了
        // ========================================
        function endGame() {
            gameOver = true;
            document.getElementById('final-score-value').textContent = score;
            document.getElementById('game-over').style.display = 'block';
            bgm.pause();
        }

        // ========================================
        // ゲーム開始
        // ========================================
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('game-over').style.display = 'none';
            
            resizeCanvasForMobile();
            init();
            
            // BGM再生
            bgm.volume = 0.5;
            bgm.play().catch(err => {
                console.log('BGM再生エラー:', err);
            });
            
            requestAnimationFrame(update);
        }

        // ========================================
        // リスタート
        // ========================================
        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            init();
            gameOver = false;
            paused = false;
            bgm.currentTime = 0;
            bgm.play();
            requestAnimationFrame(update);
        }

        // ========================================
        // ポーズ
        // ========================================
        function togglePause() {
            if (gameOver) return;
            paused = !paused;
            if (paused) {
                bgm.pause();
            } else {
                bgm.play();
            }
        }

        // ========================================
        // ミュート
        // ========================================
        function toggleMute() {
            bgm.muted = !bgm.muted;
            document.getElementById('mute-text').textContent = bgm.muted ? 'UNMUTE' : 'MUTE';
        }

        // ========================================
        // ボリューム変更
        // ========================================
        function changeVolume(value) {
            bgm.volume = value / 100;
        }

        // ========================================
        // キーボード入力
        // ========================================
        document.addEventListener('keydown', e => {
            if (gameOver && e.key !== 'r' && e.key !== 'R') return;

            switch(e.key) {
                case 'ArrowLeft':
                    move(-1);
                    break;
                case 'ArrowRight':
                    move(1);
                    break;
                case 'ArrowDown':
                    moveDown();
                    break;
                case 'ArrowUp':
                case 'x':
                case 'X':
                    rotate(1);
                    break;
                case 'z':
                case 'Z':
                    rotate(-1);
                    break;
                case ' ':
                    e.preventDefault();
                    hardDrop();
                    break;
                case 'c':
                case 'C':
                    hold();
                    break;
                case 'p':
                case 'P':
                    togglePause();
                    break;
                case 'r':
                case 'R':
                    restartGame();
                    break;
            }
        });

        // ========================================
        // スタートボタン
        // ========================================
        document.getElementById('start-btn').addEventListener('click', startGame);

        // ========================================
        // モバイル対応: キャンバスサイズ調整
        // ========================================
        function resizeCanvasForMobile() {
            if (window.innerWidth > 768) return;

            // タッチコントロールの高さを取得（まだ表示前なら推定値）
            const touchCtrl = document.getElementById('touch-controls');
            const touchH = touchCtrl ? touchCtrl.offsetHeight || 120 : 120;

            // 使える縦方向の高さ: ビューポート - タッチコントロール - サイドパネル推定 - 余白
            const sidePanelH = 70; // スコア等の横並びパネル
            const paddings = 30;
            const availH = window.innerHeight - touchH - sidePanelH - paddings;
            const availW = window.innerWidth - 20;

            // ブロックサイズはどちらかの制約に合わせる
            const bsByH = Math.floor(availH / ROWS);
            const bsByW = Math.floor(availW / COLS);
            const bs = Math.min(bsByH, bsByW, 30);

            const newW = bs * COLS;
            const newH = bs * ROWS;

            canvas.width = newW;
            canvas.height = newH;

            window._mobileBlockSize = bs;
        }

        // BLOCK_SIZEのモバイル対応（動的に差し替え）
        function getBlockSize() {
            return window._mobileBlockSize || BLOCK_SIZE;
        }

        // drawBlockをモバイル対応版に差し替え（元のdrawBlockを上書き）
        function drawBlock(x, y, color) {
            const bs = getBlockSize();
            ctx.fillStyle = color;
            ctx.fillRect(x * bs, y * bs, bs, bs);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.strokeRect(x * bs + 1, y * bs + 1, bs - 2, bs - 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(x * bs + bs - 4, y * bs + 4, 4, bs - 4);
        }

        function drawBoard() {
            const bs = getBlockSize();
            ctx.fillStyle = 'rgba(0, 0, 20, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(64, 224, 208, 0.1)';
            ctx.lineWidth = 1;
            for (let row = 0; row <= ROWS; row++) {
                ctx.beginPath(); ctx.moveTo(0, row * bs); ctx.lineTo(COLS * bs, row * bs); ctx.stroke();
            }
            for (let col = 0; col <= COLS; col++) {
                ctx.beginPath(); ctx.moveTo(col * bs, 0); ctx.lineTo(col * bs, ROWS * bs); ctx.stroke();
            }
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) drawBlock(col, row, board[row][col]);
                }
            }
        }

        // ========================================
        // タッチ操作
        // ========================================
        let repeatTimer = null;
        let repeatInterval = null;

        function touchAction(action) {
            if (gameOver && action !== 'pause') return;
            switch(action) {
                case 'left': move(-1); break;
                case 'right': move(1); break;
                case 'down': moveDown(); break;
                case 'hardDrop': hardDrop(); break;
                case 'rotateR': rotate(1); break;
                case 'rotateL': rotate(-1); break;
                case 'hold': hold(); break;
                case 'pause': togglePause(); break;
            }
        }

        function touchEnd(e) {
            e.preventDefault();
        }

        function startRepeat(action) {
            touchAction(action);
            repeatTimer = setTimeout(() => {
                repeatInterval = setInterval(() => touchAction(action), 80);
            }, 200);
        }

        function stopRepeat() {
            clearTimeout(repeatTimer);
            clearInterval(repeatInterval);
            repeatTimer = null;
            repeatInterval = null;
        }

        // スワイプジェスチャー対応
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;
        let swipeLocked = false;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
            touchStartTime = Date.now();
            swipeLocked = false;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (swipeLocked) return;
            const t = e.touches[0];
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (absDx > 20 && absDx > absDy) {
                touchAction(dx > 0 ? 'right' : 'left');
                touchStartX = t.clientX;
            } else if (absDy > 25 && absDy > absDx) {
                touchAction('down');
                touchStartY = t.clientY;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const elapsed = Date.now() - touchStartTime;
            const t = e.changedTouches[0];
            const dx = Math.abs(t.clientX - touchStartX);
            const dy = Math.abs(t.clientY - touchStartY);
            // タップで回転
            if (elapsed < 200 && dx < 10 && dy < 10) {
                rotate(1);
            }
        }, { passive: false });

        // リサイズ時の対応
        window.addEventListener('resize', () => {
            resizeCanvasForMobile();
            if (currentPiece) render();
        });

        // 初回ロード時にリサイズ
        resizeCanvasForMobile();
    </script>
</body>
</html>
