<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Russian Mosque Tetris</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: #0a0a1a;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        #background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('assets/bg-mosque-russia.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 26, 0.6); z-index: 1;
        }

        /* ===================== デスクトップ ===================== */
        #game-wrapper {
            position: relative; z-index: 2;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; gap: 30px;
        }
        .glass-panel {
            background: rgba(15, 30, 60, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(218, 165, 32, 0.3);
            border-radius: 15px; padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #canvas { border: 3px solid rgba(64,224,208,0.5); border-radius: 8px; box-shadow: 0 0 20px rgba(64,224,208,0.3); display: block; }
        #side-panel { display: flex; flex-direction: column; gap: 20px; width: 200px; }
        .info-box { background: rgba(15,30,60,0.4); backdrop-filter: blur(8px); border: 1px solid rgba(218,165,32,0.4); border-radius: 10px; padding: 15px; color: #daa520; text-align: center; }
        .info-box h3 { font-size: 14px; color: #40e0d0; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .info-box .value { font-size: 24px; font-weight: bold; color: #daa520; text-shadow: 0 0 10px rgba(218,165,32,0.5); }
        .preview-canvas { margin: 10px auto; display: block; border: 1px solid rgba(64,224,208,0.3); border-radius: 5px; }
        .desk-controls { display: flex; flex-direction: column; gap: 10px; }
        .desk-controls button { background: linear-gradient(135deg,rgba(218,165,32,0.3),rgba(64,224,208,0.3)); border: 2px solid rgba(218,165,32,0.5); border-radius: 8px; color: #fff; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .desk-controls button:hover { background: linear-gradient(135deg,rgba(218,165,32,0.5),rgba(64,224,208,0.5)); box-shadow: 0 0 15px rgba(218,165,32,0.6); transform: translateY(-2px); }
        .volume-control { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        input[type="range"] { flex: 1; accent-color: #40e0d0; }

        /* ===================== スタート画面 ===================== */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; gap: 30px;
        }
        #start-screen h1 { font-size: 48px; color: #daa520; text-shadow: 0 0 30px rgba(218,165,32,0.8); letter-spacing: 4px; }
        #start-screen .subtitle { font-size: 18px; color: #40e0d0; letter-spacing: 2px; }
        #start-btn { font-size: 18px; padding: 20px 50px; background: linear-gradient(135deg,#daa520,#40e0d0); border: 3px solid #fff; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
        .controls-guide { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.8; text-align: center; }
        .controls-guide strong { color: #40e0d0; }

        /* ===================== ゲームオーバー ===================== */
        #game-over {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 999; text-align: center;
            background: rgba(15,30,60,0.95); backdrop-filter: blur(15px);
            border: 3px solid #daa520; border-radius: 20px; padding: 40px 60px;
        }
        #game-over h2 { font-size: 36px; color: #ff6b6b; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,107,107,0.8); }
        #game-over .final-score { font-size: 24px; color: #daa520; margin-bottom: 30px; }
        #game-over button { background: linear-gradient(135deg,rgba(218,165,32,0.3),rgba(64,224,208,0.3)); border: 2px solid rgba(218,165,32,0.5); border-radius: 8px; color: #fff; padding: 12px 24px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* ===================== モバイル専用レイアウト ===================== */
        #mobile-layout { display: none; }

        @media (max-width: 768px) {
            html { height: 100%; }
            body {
                height: 100%;
                height: -webkit-fill-available;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            #game-wrapper  { display: none !important; }
            #mobile-layout {
                display: flex !important;
                flex-direction: column;
                flex: 1;
                min-height: 0;
                position: relative;
                z-index: 2;
            }
            #mobile-board-area {
                display: flex;
                justify-content: center;
                align-items: center;
                flex: 1;
                min-height: 0;
                padding: 4px 4px 0;
            }
            #mobile-canvas {
                border: 3px solid rgba(64,224,208,0.5);
                border-radius: 8px;
                box-shadow: 0 0 16px rgba(64,224,208,0.3);
                display: block;
            }
            /* 情報バー */
            #mobile-info-bar {
                display: flex;
                align-items: center;
                justify-content: space-around;
                padding: 4px 8px;
                background: rgba(5,10,30,0.92);
                border-top: 1px solid rgba(64,224,208,0.2);
                border-bottom: 1px solid rgba(64,224,208,0.15);
                flex-shrink: 0;
                gap: 2px;
            }
            .minfo-cell { display: flex; flex-direction: column; align-items: center; min-width: 0; }
            .minfo-label { font-size: 8px; color: #40e0d0; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }
            .minfo-value { font-size: 14px; font-weight: bold; color: #daa520; text-shadow: 0 0 6px rgba(218,165,32,0.5); white-space: nowrap; }
            .minfo-canvas { border: 1px solid rgba(64,224,208,0.4); border-radius: 4px; background: rgba(0,0,20,0.6); display: block; }
            /* 操作パッド */
            #mobile-controls {
                display: flex;
                flex-direction: column;
                gap: 5px;
                padding: 6px 8px 12px;
                background: rgba(5,10,30,0.96);
                flex-shrink: 0;
            }
            .ctrl-row { display: flex; gap: 5px; align-items: stretch; }
            .tbtn {
                flex: 1;
                height: 50px;
                background: rgba(64,224,208,0.1);
                border: 1.5px solid rgba(64,224,208,0.32);
                border-radius: 10px;
                color: #40e0d0;
                font-size: 20px; font-weight: bold;
                display: flex; align-items: center; justify-content: center;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
                /* pointerイベントを確実に受け取る */
                pointer-events: auto;
                -webkit-user-select: none;
                user-select: none;
            }
            .tbtn:active { background: rgba(64,224,208,0.35) !important; transform: scale(0.94); }
            .t-hold { background: rgba(147,112,219,0.12) !important; border-color: rgba(147,112,219,0.42) !important; color: #9370db !important; font-size: 12px !important; }
            .t-drop { background: rgba(218,165,32,0.13) !important; border-color: rgba(218,165,32,0.42) !important; color: #daa520 !important; font-size: 13px !important; font-weight: bold !important; flex: 1.5 !important; }
            .t-pause { background: rgba(255,107,107,0.1) !important; border-color: rgba(255,107,107,0.38) !important; color: #ff6b6b !important; font-size: 11px !important; flex: 0 0 62px !important; }

            #start-screen h1 { font-size: 30px; }
            #start-screen .subtitle { font-size: 13px; }
            #start-btn { font-size: 15px; padding: 14px 35px; }
            .controls-guide { font-size: 11px; padding: 0 20px; }
        }

        @media (max-width: 380px) {
            .tbtn { height: 44px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="background"></div>
    <div id="overlay"></div>

    <!-- スタート画面 -->
    <div id="start-screen">
        <h1>RUSSIAN TETRIS</h1>
        <p class="subtitle">~ Mosque Night ~</p>
        <button id="start-btn">START GAME</button>
        <div class="controls-guide">
            <strong>← →</strong> 移動 &nbsp;|&nbsp; <strong>↓</strong> ソフトドロップ &nbsp;|&nbsp; <strong>Space</strong> ハードドロップ<br>
            <strong>↑ / X</strong> 右回転 &nbsp;|&nbsp; <strong>Z</strong> 左回転 &nbsp;|&nbsp; <strong>C</strong> ホールド<br>
            📱 モバイル: 画面下のボタンで操作
        </div>
    </div>

    <!-- ゲームオーバー -->
    <div id="game-over">
        <h2>GAME OVER</h2>
        <div class="final-score">Score: <span id="final-score-value">0</span></div>
        <button id="restart-btn">RESTART</button>
    </div>

    <!-- ===== デスクトップ レイアウト ===== -->
    <div id="game-wrapper" style="display:none;">
        <div class="glass-panel">
            <canvas id="canvas" width="300" height="600"></canvas>
        </div>
        <div id="side-panel">
            <div class="info-box"><h3>Score</h3><div class="value" id="score">0</div></div>
            <div class="info-box"><h3>Level</h3><div class="value" id="level">1</div></div>
            <div class="info-box"><h3>Lines</h3><div class="value" id="lines">0</div></div>
            <div class="info-box">
                <h3>Next</h3>
                <canvas id="next-canvas" class="preview-canvas" width="100" height="100"></canvas>
            </div>
            <div class="info-box">
                <h3>Hold</h3>
                <canvas id="hold-canvas" class="preview-canvas" width="100" height="100"></canvas>
            </div>
            <div class="desk-controls glass-panel">
                <button id="desk-pause-btn">PAUSE (P)</button>
                <button id="desk-restart-btn">RESTART (R)</button>
                <button id="desk-mute-btn">🔊 <span id="mute-text">MUTE</span></button>
                <div class="volume-control">
                    <span style="color:#40e0d0;">Vol:</span>
                    <input type="range" id="volume" min="0" max="100" value="50">
                </div>
            </div>
        </div>
    </div>

    <!-- ===== モバイル レイアウト ===== -->
    <div id="mobile-layout">
        <div id="mobile-board-area">
            <canvas id="mobile-canvas"></canvas>
        </div>
        <div id="mobile-info-bar">
            <div class="minfo-cell">
                <span class="minfo-label">SCORE</span>
                <span class="minfo-value" id="m-score">0</span>
            </div>
            <div class="minfo-cell">
                <span class="minfo-label">LV</span>
                <span class="minfo-value" id="m-level">1</span>
            </div>
            <div class="minfo-cell">
                <span class="minfo-label">LINES</span>
                <span class="minfo-value" id="m-lines">0</span>
            </div>
            <div class="minfo-cell">
                <span class="minfo-label">NEXT</span>
                <canvas class="minfo-canvas" id="m-next-canvas" width="40" height="40"></canvas>
            </div>
            <div class="minfo-cell">
                <span class="minfo-label">HOLD</span>
                <canvas class="minfo-canvas" id="m-hold-canvas" width="40" height="40"></canvas>
            </div>
        </div>
        <div id="mobile-controls">
            <div class="ctrl-row">
                <div class="tbtn t-hold" id="tb-hold">HOLD</div>
                <div class="tbtn" id="tb-rotL">↺</div>
                <div class="tbtn" id="tb-rotR">↻</div>
                <div class="tbtn t-drop" id="tb-drop">⬇ DROP</div>
                <div class="tbtn t-pause" id="tb-pause">⏸<br><span style="font-size:9px;">PAUSE</span></div>
            </div>
            <div class="ctrl-row">
                <div class="tbtn" id="tb-left">◀</div>
                <div class="tbtn" id="tb-down" style="flex:1.5;">▼</div>
                <div class="tbtn" id="tb-right">▶</div>
            </div>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="assets/korobeiniki.mp3" type="audio/mpeg">
    </audio>

    <script>
    // ================================================================
    // 定数
    // ================================================================
    const COLS = 10, ROWS = 20, BLOCK_SIZE = 30;

    const PIECES = {
        I: { shape: [[1,1,1,1]],          color: '#40e0d0' },
        O: { shape: [[1,1],[1,1]],         color: '#daa520' },
        T: { shape: [[0,1,0],[1,1,1]],     color: '#9370db' },
        S: { shape: [[0,1,1],[1,1,0]],     color: '#4169e1' },
        Z: { shape: [[1,1,0],[0,1,1]],     color: '#ff6b6b' },
        J: { shape: [[1,0,0],[1,1,1]],     color: '#1e90ff' },
        L: { shape: [[0,0,1],[1,1,1]],     color: '#ffa500' },
    };
    const PIECE_NAMES = Object.keys(PIECES);

    // ================================================================
    // ゲーム状態
    // ================================================================
    let board, score, lines, level, gameOver, paused;
    let dropCounter, dropInterval, lastTime;
    let currentPiece, nextPiece, holdPiece, canHold;
    let animId = null;

    function isMobile() { return window.innerWidth <= 768; }

    function getCanvas() {
        return isMobile()
            ? document.getElementById('mobile-canvas')
            : document.getElementById('canvas');
    }

    // ================================================================
    // 初期化
    // ================================================================
    function init() {
        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        score = lines = 0; level = 1;
        gameOver = paused = false;
        canHold = true; holdPiece = null;
        dropCounter = 0; dropInterval = 1000; lastTime = 0;
        currentPiece = createPiece();
        nextPiece    = createPiece();
        updateDisplay();
        render();
        drawNext();
        drawHold();
    }

    function createPiece() {
        const name = PIECE_NAMES[Math.floor(Math.random() * PIECE_NAMES.length)];
        const p = PIECES[name];
        return {
            shape: p.shape.map(r => [...r]),
            color: p.color,
            x: Math.floor(COLS/2) - Math.floor(p.shape[0].length/2),
            y: 0, name
        };
    }

    // ================================================================
    // 描画
    // ================================================================
    function getBS() {
        const cv = getCanvas();
        return cv.width / COLS;
    }

    function drawBlock(ctx, x, y, color, bs) {
        ctx.fillStyle = color;
        ctx.fillRect(x*bs, y*bs, bs, bs);
        ctx.strokeStyle = 'rgba(255,255,255,0.28)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x*bs+1, y*bs+1, bs-2, bs-2);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(x*bs+bs-4, y*bs+4, 4, bs-4);
    }

    function render() {
        const cv = getCanvas();
        const ctx = cv.getContext('2d');
        const bs = cv.width / COLS;

        ctx.fillStyle = 'rgba(0,0,20,0.85)';
        ctx.fillRect(0, 0, cv.width, cv.height);

        ctx.strokeStyle = 'rgba(64,224,208,0.08)';
        ctx.lineWidth = 0.5;
        for (let r = 0; r <= ROWS; r++) {
            ctx.beginPath(); ctx.moveTo(0, r*bs); ctx.lineTo(cv.width, r*bs); ctx.stroke();
        }
        for (let c = 0; c <= COLS; c++) {
            ctx.beginPath(); ctx.moveTo(c*bs, 0); ctx.lineTo(c*bs, cv.height); ctx.stroke();
        }

        for (let r = 0; r < ROWS; r++)
            for (let c = 0; c < COLS; c++)
                if (board[r][c]) drawBlock(ctx, c, r, board[r][c], bs);

        if (currentPiece)
            currentPiece.shape.forEach((row, dy) =>
                row.forEach((v, dx) => {
                    if (v) drawBlock(ctx, currentPiece.x+dx, currentPiece.y+dy, currentPiece.color, bs);
                })
            );
    }

    function drawPreview(canvasId, pieceOrName) {
        const cv = document.getElementById(canvasId);
        if (!cv) return;
        const ctx = cv.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,20,0.6)';
        ctx.fillRect(0, 0, cv.width, cv.height);
        if (!pieceOrName) return;
        const def = typeof pieceOrName === 'string' ? PIECES[pieceOrName] : pieceOrName;
        const shape = def.shape, color = def.color;
        const bs = Math.floor(Math.min(cv.width/shape[0].length, cv.height/shape.length) * 0.82);
        const ox = Math.floor((cv.width  - shape[0].length*bs)/2);
        const oy = Math.floor((cv.height - shape.length   *bs)/2);
        shape.forEach((row, dy) =>
            row.forEach((v, dx) => {
                if (!v) return;
                ctx.fillStyle = color;
                ctx.fillRect(ox+dx*bs, oy+dy*bs, bs-1, bs-1);
                ctx.strokeStyle = 'rgba(255,255,255,0.22)';
                ctx.lineWidth = 1;
                ctx.strokeRect(ox+dx*bs, oy+dy*bs, bs-1, bs-1);
            })
        );
    }

    function drawNext() {
        drawPreview(isMobile() ? 'm-next-canvas' : 'next-canvas', nextPiece);
    }
    function drawHold() {
        const id = isMobile() ? 'm-hold-canvas' : 'hold-canvas';
        drawPreview(id, holdPiece ? holdPiece : null);
    }

    function updateDisplay() {
        document.getElementById('score').textContent   = score;
        document.getElementById('level').textContent   = level;
        document.getElementById('lines').textContent   = lines;
        document.getElementById('m-score').textContent = score;
        document.getElementById('m-level').textContent = level;
        document.getElementById('m-lines').textContent = lines;
    }

    // ================================================================
    // ロジック
    // ================================================================
    function collides(piece, ox=0, oy=0) {
        for (let dy=0; dy<piece.shape.length; dy++)
            for (let dx=0; dx<piece.shape[dy].length; dx++)
                if (piece.shape[dy][dx]) {
                    const nx=piece.x+dx+ox, ny=piece.y+dy+oy;
                    if (nx<0||nx>=COLS||ny>=ROWS) return true;
                    if (ny>=0&&board[ny][nx]) return true;
                }
        return false;
    }

    function merge() {
        currentPiece.shape.forEach((row,dy) =>
            row.forEach((v,dx) => {
                if (v) { const y=currentPiece.y+dy; if(y>=0) board[y][currentPiece.x+dx]=currentPiece.color; }
            })
        );
        clearLines();
        currentPiece = nextPiece;
        nextPiece = createPiece();
        canHold = true;
        drawNext();
        if (collides(currentPiece)) endGame();
    }

    function clearLines() {
        let n=0;
        for (let r=ROWS-1;r>=0;r--)
            if (board[r].every(c=>c!==0)) { board.splice(r,1); board.unshift(Array(COLS).fill(0)); n++; r++; }
        if (n>0) {
            lines+=n; score+=[0,100,300,500,800][n]*level;
            level=Math.floor(lines/10)+1;
            dropInterval=Math.max(100,1000-(level-1)*50);
            updateDisplay();
        }
    }

    function rotateMatrix(m, dir=1) {
        const N=m.length, M=m[0].length;
        if (dir===1) {
            const r=Array.from({length:M},()=>Array(N).fill(0));
            for(let i=0;i<N;i++) for(let j=0;j<M;j++) r[j][N-1-i]=m[i][j];
            return r;
        } else {
            const r=Array.from({length:M},()=>Array(N).fill(0));
            for(let i=0;i<N;i++) for(let j=0;j<M;j++) r[M-1-j][i]=m[i][j];
            return r;
        }
    }

    // ================================================================
    // 操作関数
    // ================================================================
    function moveLeft()  { if(!gameOver&&!paused&&!collides(currentPiece,-1)){currentPiece.x--;render();} }
    function moveRight() { if(!gameOver&&!paused&&!collides(currentPiece,1)){currentPiece.x++;render();} }
    function moveDown()  {
        if(gameOver||paused) return;
        if(!collides(currentPiece,0,1)){currentPiece.y++;render();}
        else merge();
        dropCounter=0;
    }
    function hardDrop() {
        if(gameOver||paused) return;
        while(!collides(currentPiece,0,1)) currentPiece.y++;
        merge(); render();
    }
    function rotate(dir=1) {
        if(gameOver||paused) return;
        const old=currentPiece.shape;
        currentPiece.shape=rotateMatrix(old,dir);
        let off=0;
        while(collides(currentPiece,off)) off=off>0?-off:-off+1;
        if(collides(currentPiece,off)) currentPiece.shape=old;
        else currentPiece.x+=off;
        render();
    }
    function hold() {
        if(gameOver||paused||!canHold) return;
        if(holdPiece===null){
            holdPiece=currentPiece.name;
            currentPiece=nextPiece; nextPiece=createPiece();
        } else {
            const tmp=holdPiece; holdPiece=currentPiece.name;
            const p=PIECES[tmp];
            currentPiece={shape:p.shape.map(r=>[...r]),color:p.color,x:Math.floor(COLS/2)-Math.floor(p.shape[0].length/2),y:0,name:tmp};
        }
        canHold=false; drawHold(); render();
    }
    function togglePause() {
        if(gameOver) return;
        paused=!paused;
        if(paused) bgm.pause(); else bgm.play();
    }

    // ================================================================
    // ゲームループ
    // ================================================================
    function update(time=0) {
        if(!gameOver&&!paused) {
            dropCounter+=time-lastTime;
            if(dropCounter>dropInterval){moveDown();dropCounter=0;}
        }
        lastTime=time;
        animId=requestAnimationFrame(update);
    }

    function endGame() {
        gameOver=true;
        document.getElementById('final-score-value').textContent=score;
        document.getElementById('game-over').style.display='block';
        bgm.pause();
    }

    // ================================================================
    // モバイルキャンバスサイズ
    // ================================================================
    function setupMobileCanvas() {
        if(!isMobile()) return;
        // 描画前に一瞬表示してレイアウト高さを取得
        const infoH   = document.getElementById('mobile-info-bar').offsetHeight  || 52;
        const ctrlH   = document.getElementById('mobile-controls').offsetHeight  || 115;
        const winH    = window.innerHeight;
        const winW    = window.innerWidth;
        const availH  = winH - infoH - ctrlH - 16;
        const availW  = winW - 12;
        const bs = Math.min(Math.floor(availH/ROWS), Math.floor(availW/COLS), 32);
        const cv = document.getElementById('mobile-canvas');
        cv.width  = bs * COLS;
        cv.height = bs * ROWS;
    }

    // ================================================================
    // 開始・リスタート
    // ================================================================
    function startGame() {
        document.getElementById('start-screen').style.display='none';
        document.getElementById('game-over').style.display='none';
        if(isMobile()) {
            document.getElementById('mobile-layout').style.display='flex';
            document.getElementById('game-wrapper').style.display='none';
        } else {
            document.getElementById('game-wrapper').style.display='flex';
            document.getElementById('mobile-layout').style.display='none';
        }
        setupMobileCanvas();
        if(animId) cancelAnimationFrame(animId);
        init();
        bgm.volume=0.5;
        bgm.play().catch(()=>{});
        animId=requestAnimationFrame(update);
    }

    function restartGame() {
        document.getElementById('game-over').style.display='none';
        setupMobileCanvas();
        if(animId) cancelAnimationFrame(animId);
        init();
        gameOver=false; paused=false;
        bgm.currentTime=0;
        bgm.play().catch(()=>{});
        animId=requestAnimationFrame(update);
    }

    // ================================================================
    // キーボード
    // ================================================================
    document.addEventListener('keydown', e => {
        if(gameOver&&!['r','R'].includes(e.key)) return;
        switch(e.key) {
            case 'ArrowLeft':  moveLeft();   break;
            case 'ArrowRight': moveRight();  break;
            case 'ArrowDown':  moveDown();   break;
            case 'ArrowUp': case 'x': case 'X': rotate(1);  break;
            case 'z': case 'Z':              rotate(-1); break;
            case ' ': e.preventDefault(); hardDrop(); break;
            case 'c': case 'C': hold();      break;
            case 'p': case 'P': togglePause(); break;
            case 'r': case 'R': restartGame(); break;
        }
    });

    // ================================================================
    // タッチボタン — pointerdown/pointerup で統一（iOS Safari 対応）
    // ================================================================
    let repeatTimer=null, repeatInterval=null;

    function startRepeat(fn) {
        fn();
        repeatTimer=setTimeout(()=>{ repeatInterval=setInterval(fn,80); },180);
    }
    function stopRepeat() {
        clearTimeout(repeatTimer); clearInterval(repeatInterval);
        repeatTimer=repeatInterval=null;
    }

    function bindBtn(id, fn, repeat=false) {
        const el=document.getElementById(id);
        if(!el) return;
        if(repeat) {
            el.addEventListener('pointerdown', e=>{ e.preventDefault(); startRepeat(fn); }, {passive:false});
            el.addEventListener('pointerup',     e=>{ e.preventDefault(); stopRepeat(); }, {passive:false});
            el.addEventListener('pointercancel', stopRepeat);
            el.addEventListener('pointerleave',  stopRepeat);
        } else {
            el.addEventListener('pointerdown', e=>{ e.preventDefault(); fn(); }, {passive:false});
            el.addEventListener('pointerup',   e=>{ e.preventDefault(); }, {passive:false});
        }
    }

    bindBtn('tb-left',  moveLeft,    true);
    bindBtn('tb-right', moveRight,   true);
    bindBtn('tb-down',  moveDown,    true);
    bindBtn('tb-rotL',  ()=>rotate(-1));
    bindBtn('tb-rotR',  ()=>rotate(1));
    bindBtn('tb-drop',  hardDrop);
    bindBtn('tb-hold',  hold);
    bindBtn('tb-pause', togglePause);

    // デスクトップボタン
    document.getElementById('desk-pause-btn').addEventListener('click',  togglePause);
    document.getElementById('desk-restart-btn').addEventListener('click', restartGame);
    document.getElementById('desk-mute-btn').addEventListener('click', ()=>{
        bgm.muted=!bgm.muted;
        document.getElementById('mute-text').textContent=bgm.muted?'UNMUTE':'MUTE';
    });
    document.getElementById('volume').addEventListener('input', e=>{ bgm.volume=e.target.value/100; });

    document.getElementById('start-btn').addEventListener('click',  startGame);
    document.getElementById('restart-btn').addEventListener('click', restartGame);

    // ================================================================
    // ゲームキャンバスのスワイプ操作
    // ================================================================
    let tSX=0, tSY=0, tST=0;
    const mCv = document.getElementById('mobile-canvas');
    mCv.addEventListener('pointerdown', e=>{ tSX=e.clientX; tSY=e.clientY; tST=Date.now(); mCv.setPointerCapture(e.pointerId); });
    mCv.addEventListener('pointermove', e=>{
        if(!tST) return;
        const dx=e.clientX-tSX, dy=e.clientY-tSY;
        if(Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)){ dx>0?moveRight():moveLeft(); tSX=e.clientX; }
        else if(dy>22&&Math.abs(dy)>Math.abs(dx)){ moveDown(); tSY=e.clientY; }
    });
    mCv.addEventListener('pointerup', e=>{
        if(Date.now()-tST<200&&Math.abs(e.clientX-tSX)<12&&Math.abs(e.clientY-tSY)<12) rotate(1);
        tST=0;
    });

    window.addEventListener('resize', ()=>{ setupMobileCanvas(); if(currentPiece) render(); });
    </script>
</body>
</html>
