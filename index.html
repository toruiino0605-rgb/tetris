function drawPx(ox,oy,data,pal,s=1){
  for(let y=0;y<data.length;y++)for(let x=0;x<data[y].length;x++){
    const c=data[y][x];if(c&&pal[c]){ctx.fillStyle=pal[c];ctx.fillRect(ox+x*s,oy+y*s,s,s);}
  }
}

function snd(f,d,t='square',v=0.1){
  ensureAudio();if(!ax)return;try{

// Victory fanfare - original triumphant melody
function playVictoryMusic(){
  ensureAudio();if(!ax)return;
  // Triumphant fanfare: uplifting, celebratory chiptune
  const t=ax.currentTime;
  const sixteenth=60/200/4; // 200 BPM
  // Melody (square wave)
  const mel=[
    [523,2],[659,2],[784,2],[1047,4],[784,2],[1047,6], // C E G C' G C'
    [988,2],[1047,2],[1175,2],[1319,4],[1175,2],[1319,6], // B C' D' E' D' E'
    [1047,2],[1175,2],[1319,2],[1568,8], // C' D' E' G'
    [1319,4],[1175,2],[1047,4],[1319,2],[1568,12], // E' D' C' E' G' (hold)
  ];
  // Bass (triangle wave) 
  const bass=[
    [131,8],[165,8], // C3, E3
    [196,8],[220,8], // G3, A3
    [262,8],[196,8], // C4, G3
    [262,16],[131,8], // C4, C3
  ];
  // Play melody
  let mTime=0;
  mel.forEach(([freq,dur])=>{
    const d=dur*sixteenth;
    if(freq>0)bgmNote(freq,d*.9,'square',.07,t+mTime);
    mTime+=d;
  });
  // Play bass
  let bTime=0;
  bass.forEach(([freq,dur])=>{
    const d=dur*sixteenth;
    if(freq>0)bgmNote(freq,d*.85,'triangle',.06,t+bTime);
    bTime+=d;
  });
  // Harmony arpeggios
  const harm=[
    [262,2],[330,2],[392,2],[330,2],[262,2],[330,2],[392,2],[330,2],
    [294,2],[392,2],[494,2],[392,2],[294,2],[392,2],[494,2],[392,2],
    [262,2],[330,2],[392,2],[523,2],[392,2],[330,2],[262,2],[330,2],
    [262,2],[392,2],[523,2],[659,2],[523,2],[659,2],[784,2],[523,4],
  ];
  let hTime=0;
  harm.forEach(([freq,dur])=>{
    const d=dur*sixteenth;
    if(freq>0)bgmNote(freq,d*.7,'triangle',.025,t+hTime);
    hTime+=d;
  });
  // Drum fills
  for(let i=0;i<16;i++){
    bgmDrum('K',t+i*sixteenth*4);
    bgmDrum('H',t+i*sixteenth*4+sixteenth*2);
  }
  // Final cymbal crash
  bgmDrum('S',t+mTime-.1);bgmDrum('S',t+mTime);
}

function bgmNote(f,d,t,v,st){if(!ax||!f)return;try{
  const o=ax.createOscillator(),g=ax.createGain();o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,st);g.gain.setValueAtTime(v*.7,st+d*.5);
  g.gain.exponentialRampToValueAtTime(.001,st+d*.95);
  o.connect(g);g.connect(ax.destination);o.start(st);o.stop(st+d);
  bgmN.push(o);o.onended=()=>{const i=bgmN.indexOf(o);if(i>=0)bgmN.splice(i,1)};
}catch(e){}}
function bgmDrum(t,st){if(!ax)return;try{
  if(t==='K'){const o=ax.createOscillator(),g=ax.createGain();o.type='sine';
    o.frequency.setValueAtTime(150,st);o.frequency.exponentialRampToValueAtTime(40,st+.08);
    g.gain.setValueAtTime(.12,st);g.gain.exponentialRampToValueAtTime(.001,st+.1);
    o.connect(g);g.connect(ax.destination);o.start(st);o.stop(st+.1);bgmN.push(o);
    o.onended=()=>{const i=bgmN.indexOf(o);if(i>=0)bgmN.splice(i,1)};
  }else if(t==='S'||t==='H'){
    const len=t==='S'?.06:.03,vol=t==='S'?.07:.03;
    const bs=ax.sampleRate*len,bf=ax.createBuffer(1,bs,ax.sampleRate),dd=bf.getChannelData(0);
    for(let i=0;i<bs;i++)dd[i]=Math.random()*2-1;
    const s=ax.createBufferSource(),g=ax.createGain();s.buffer=bf;
    g.gain.setValueAtTime(vol,st);g.gain.exponentialRampToValueAtTime(.001,st+len);
    if(t==='H'){const hp=ax.createBiquadFilter();hp.type='highpass';hp.frequency.value=8000;
      s.connect(hp);hp.connect(g);}else s.connect(g);
    g.connect(ax.destination);s.start(st);s.stop(st+len);bgmN.push(s);
    s.onended=()=>{const i=bgmN.indexOf(s);if(i>=0)bgmN.splice(i,1)};
  }
}catch(e){}}
function tSteps(p){let t=0;for(const e of p)t+=e[1];return t}
function bgmChunk(){
  if(!bgmOn||!ax)return;const now=ax.currentTime,sx=BT/4,ch=32;
  const tM=tSteps(bgmM),tB=tSteps(bgmBa),tA=tSteps(bgmA),tD=bgmD.length;
  for(let s=0;s<ch;s++){const tm=now+s*sx,st=bgmB+s;
    const dc=bgmD[st%tD];if(dc!=='R')bgmDrum(dc,tm);
    let aP=st%tA,aA=0;for(let i=0;i<bgmA.length;i++){if(aA===aP){bgmNote(N[bgmA[i][0]]||0,bgmA[i][1]*sx*.8,'triangle',.03,tm);break;}aA+=bgmA[i][1];if(aA>aP)break;}
    let mP=st%tM,mA=0;for(let i=0;i<bgmM.length;i++){if(mA===mP){bgmNote(N[bgmM[i][0]]||0,bgmM[i][1]*sx*.85,'square',.055,tm);break;}mA+=bgmM[i][1];if(mA>mP)break;}
    let bP=st%tB,bA=0;for(let i=0;i<bgmBa.length;i++){if(bA===bP){bgmNote(N[bgmBa[i][0]]||0,bgmBa[i][1]*sx*.7,'triangle',.055,tm);break;}bA+=bgmBa[i][1];if(bA>bP)break;}
  }
  bgmB+=ch;bgmT=setTimeout(bgmChunk,ch*sx*1000*.75);
}

const clouds=[{x:8,y:2,s:1},{x:19,y:1,s:1},{x:27,y:2,s:2},{x:36,y:1,s:1},{x:56,y:2,s:2},{x:67,y:1,s:1},{x:75,y:2,s:1},{x:88,y:1,s:2},{x:105,y:2,s:1},{x:120,y:1,s:1},{x:130,y:2,s:2},{x:145,y:1,s:1},{x:160,y:2,s:1},{x:175,y:1,s:2},{x:190,y:2,s:1}];
const hills=[{x:0,s:'b'},{x:16,s:'s'},{x:48,s:'b'},{x:64,s:'s'},{x:96,s:'b'},{x:112,s:'s'},{x:144,s:'b'},{x:160,s:'s'},{x:192,s:'b'}];
const bushes=[{x:11,s:3},{x:23,s:1},{x:41,s:2},{x:59,s:3},{x:71,s:1},{x:89,s:2},{x:107,s:3},{x:119,s:1},{x:137,s:2},{x:155,s:3},{x:167,s:1},{x:185,s:2}];

// --- State ---
let gs='title',level,cam={x:0},score=0,coins=0,lives=3,time=400,tc=0,fc=0;
let mario,enemies=[],items=[],coinAn=[],debris=[],bumps=[],fireballs=[];
let flagY=0,flagDn=false,flagSeq=false,flagTm=0,autoWalk=false;
// Win celebration state
let winTimer=0,winPhase=0,winBonusTime=0,winBonusScore=0;
let fireworks=[]; // {x,y,particles:[{x,y,vx,vy,color,life}],timer}
let winMusicPlayed=false;

function createMario(){return{x:3*16,y:12*16,vx:0,vy:0,w:14,h:16,ground:false,face:1,big:false,
  at:0,wf:0,inv:0,dead:false,dt:0,dv:0,shrink:0,grow:0,fireTimer:0};}

function resetGame(){stopBGM();level=createLevel();initBC();mario=createMario();enemies=createEnemies();
  items=[];coinAn=[];debris=[];bumps=[];fireballs=[];fireworks=[];cam.x=0;score=0;coins=0;lives=3;time=400;tc=0;
  flagY=0;flagDn=false;flagSeq=false;flagTm=0;autoWalk=false;
  winTimer=0;winPhase=0;winBonusTime=0;winBonusScore=0;winMusicPlayed=false;
  gs='playing';startBGM();}
function resetLevel(){stopBGM();level=createLevel();initBC();mario=createMario();enemies=createEnemies();
  items=[];coinAn=[];debris=[];bumps=[];fireballs=[];fireworks=[];cam.x=0;time=400;tc=0;
  flagY=0;flagDn=false;flagSeq=false;flagTm=0;autoWalk=false;
  winTimer=0;winPhase=0;winBonusTime=0;winBonusScore=0;winMusicPlayed=false;
  gs='playing';startBGM();}

// --- Input ---
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(e.code==='Enter'){ensureAudio();if(gs==='title'||gs==='gameover'||gs==='win')resetGame();}
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
const mk={left:false,right:false,a:false,b:false};
function smb(id,k){const b=document.getElementById(id);
  const sa=v=>{mk[k]=v;b.classList.toggle('active',v);if(v)ensureAudio();};
  b.addEventListener('touchstart',e=>{e.preventDefault();sa(true);if(k==='a'&&(gs==='title'||gs==='gameover'||gs==='win'))resetGame();});
  b.addEventListener('touchend',e=>{e.preventDefault();sa(false);});
  b.addEventListener('touchcancel',e=>{e.preventDefault();sa(false);});}
smb('btn-left','left');smb('btn-right','right');smb('btn-a','a');smb('btn-b','b');
function iL(){return keys.ArrowLeft||keys.KeyA||mk.left}
function iR(){return keys.ArrowRight||keys.KeyD||mk.right}
function iJ(){return keys.Space||keys.ArrowUp||keys.KeyW||mk.a}
function iF(){return keys.KeyZ||keys.ShiftLeft||keys.ShiftRight||mk.b} // Fire/Run button

// Track fire button press (only fire on press, not hold)
let firePrev=false;

// --- Collision ---
function gT(tx,ty){if(tx<0||tx>=LW||ty<0||ty>=LH)return 0;return level[ty][tx];}
function solid(t){return t>=1&&t<=9||t===T.Q_EMPTY||t===T.B_EMPTY||t===T.CASTLE;}
function collide(x,y,w,h){
  const l=Math.floor(x/16),r=Math.floor((x+w-1)/16),t2=Math.floor(y/16),b=Math.floor((y+h-1)/16);
  for(let ty=t2;ty<=b;ty++)for(let tx=l;tx<=r;tx++)if(solid(gT(tx,ty)))return true;return false;}

// --- Block Hit ---
function hitBlock(tx,ty){
  const t=gT(tx,ty);
  if(t===T.QUESTION){
    const k=`${tx},${ty}`,ct=bc[k]||'coin';level[ty][tx]=T.Q_EMPTY;
    bumps.push({x:tx,y:ty,o:0,v:-3});
    if(ct==='coin'){sfxCoin();coins++;score+=200;if(coins>=100){coins-=100;lives++;sfx1up();}
      coinAn.push({x:tx*16+4,y:ty*16-16,vy:-4,t:30});
    }else if(ct==='mushroom'){sfxPowerup();
      if(!mario.big)items.push({type:'mushroom',x:tx*16,y:ty*16,vx:1,vy:0,em:0,ef:ty*16});
      else{coins++;score+=200;coinAn.push({x:tx*16+4,y:ty*16-16,vy:-4,t:30});}
    }
  }else if(t===T.BRICK){
    // ALL Mario sizes can break bricks now
    level[ty][tx]=0;sfxBreak();score+=50;
    for(let i=0;i<4;i++)debris.push({x:tx*16+(i%2)*8,y:ty*16+Math.floor(i/2)*8,
      vx:(i%2===0?-2:2)+Math.random(),vy:-5-Math.random()*3,t:60});
  }else sfxBump();
  enemies.forEach(e=>{if(!e.alive)return;const ex=Math.floor((e.x+8)/16),ey=Math.floor(e.y/16)-1;
    if(ex===tx&&ey===ty){e.alive=false;e.stomped=true;e.st=1;score+=100;}});
}

// --- Fireballs ---
function shootFireball(){
  if(mario.dead||flagSeq||autoWalk)return;
  if(fireballs.length>=2)return; // max 2 on screen
  sfxFire();
  mario.fireTimer=10; // show throw pose for 10 frames
  const mh=mario.big?32:16;
  const fx=mario.face===1?mario.x+mario.w:mario.x-8;
  const fy=mario.y+mh/2-4;
  fireballs.push({x:fx,y:fy,vx:mario.face*4,vy:0,bounce:0,life:120});
}

function updateFireballs(){
  fireballs=fireballs.filter(f=>{
    f.x+=f.vx;f.vy+=GRAVITY;if(f.vy>MAX_FALL)f.vy=MAX_FALL;f.y+=f.vy;f.life--;
    // Ground bounce
    if(collide(f.x+2,f.y+8,4,1)){
      f.y=Math.floor((f.y+8)/16)*16-8;f.vy=-3.5;f.bounce++;
    }
    // Wall collision
    if(collide(f.vx>0?f.x+7:f.x,f.y,1,7))return false;
    // Off screen
    if(f.x<cam.x-16||f.x>cam.x+VIEW_W+16||f.y>LH*16)return false;
    if(f.life<=0||f.bounce>5)return false;
    // Hit enemies
    let hit=false;
    enemies.forEach(e=>{
      if(!e.alive||hit)return;
      const ew=14,eh=16;
      if(f.x+6>e.x&&f.x<e.x+ew&&f.y+6>e.y&&f.y<e.y+eh){
        sfxFireHit();score+=100;hit=true;
        if(e.type==='goomba'){e.alive=false;e.stomped=true;e.st=1;}
        else if(e.type==='koopa'){
          if(!e.shell){e.shell=true;e.sv=0;e.y+=8;}
          else{e.alive=false;e.stomped=true;e.st=1;}
        }
      }
    });
    return !hit;
  });
}

// --- Mario ---
function updateMario(){
  if(mario.dead){mario.dt++;if(mario.dt>20){mario.dv+=GRAVITY;mario.y+=mario.dv;}
    if(mario.dt>180){lives--;if(lives<=0){stopBGM();gs='gameover';}else resetLevel();}return;}
  if(mario.grow>0){mario.grow--;if(mario.grow===0)snapGround();return;}
  if(mario.shrink>0){mario.shrink--;
    // Gravity still applies during shrink animation
    mario.vy+=GRAVITY;if(mario.vy>MAX_FALL)mario.vy=MAX_FALL;
    const ny=mario.y+mario.vy;
    if(mario.vy>=0&&collide(mario.x+2,ny+16,mario.w-4,1)){mario.y=Math.floor((ny+16)/16)*16-16;mario.vy=0;mario.ground=true;}
    else{mario.y=ny;mario.ground=false;}return;}
  if(flagSeq){updateFlag();return;}
  if(autoWalk){mario.vx=1.5;mario.x+=mario.vx;mario.vy+=GRAVITY;if(mario.vy>MAX_FALL)mario.vy=MAX_FALL;
    mario.y+=mario.vy;const mh=mario.big?32:16;
    if(collide(mario.x+2,mario.y+mh,mario.w-4,1)){mario.y=Math.floor((mario.y+mh)/16)*16-mh;mario.vy=0;mario.ground=true;}
    if(mario.x>205*16){stopBGM();gs='win';winTimer=0;winPhase=0;winBonusTime=time;winBonusScore=0;winMusicPlayed=false;fireworks=[];}return;}

  // Fire button (press, not hold)
  const fireNow=iF();
  if(fireNow&&!firePrev)shootFireball();
  firePrev=fireNow;

  if(mario.fireTimer>0)mario.fireTimer--;

  const maxSpd=iF()?2.5:1.5,acc=mario.ground?.15:.1,fric=mario.ground?.12:.02;
  if(iL()){mario.vx-=acc;mario.face=-1;}else if(iR()){mario.vx+=acc;mario.face=1;}
  else{if(mario.vx>0)mario.vx=Math.max(0,mario.vx-fric);if(mario.vx<0)mario.vx=Math.min(0,mario.vx+fric);}
  mario.vx=Math.max(-maxSpd,Math.min(maxSpd,mario.vx));
  if(iJ()&&mario.ground){const spd=Math.abs(mario.vx);mario.vy=-7.5-(spd/2.5)*1;mario.ground=false;sfxJump();}
  if(!iJ()&&mario.vy<-3)mario.vy=-3;
  mario.vy+=GRAVITY;if(mario.vy>MAX_FALL)mario.vy=MAX_FALL;
  const mh=mario.big?32:16,CM=2;

  const nx=mario.x+mario.vx;
  if(!collide(nx+CM,mario.y+1,mario.w-CM*2,mh-2))mario.x=nx;
  else{if(mario.vx>0)mario.x=Math.floor((nx+CM+mario.w-CM*2)/16)*16-mario.w+CM;
    else if(mario.vx<0)mario.x=Math.ceil((nx+CM)/16)*16-CM;mario.vx=0;}

  const ny=mario.y+mario.vy;
  if(mario.vy>=0){if(collide(mario.x+CM,ny+mh,mario.w-CM*2,1)){mario.y=Math.floor((ny+mh)/16)*16-mh;mario.vy=0;mario.ground=true;}
    else{mario.y=ny;mario.ground=false;}}
  else{if(collide(mario.x+CM,ny,mario.w-CM*2,1)){mario.y=Math.floor(ny/16+1)*16;mario.vy=0;
    hitBlock(Math.floor((mario.x+mario.w/2)/16),Math.floor(ny/16));}else mario.y=ny;}

  if(mario.x<cam.x)mario.x=cam.x;if(mario.x<0)mario.x=0;
  if(mario.y>LH*16)killMario();
  if(mario.inv>0)mario.inv--;
  if(Math.abs(mario.vx)>.3){mario.at++;if(mario.at>(8-Math.abs(mario.vx)*2)){mario.wf=(mario.wf+1)%2;mario.at=0;}}
  else{mario.wf=0;mario.at=0;}
  const mtx=Math.floor((mario.x+mario.w/2)/16),mty=Math.floor((mario.y+mh/2)/16);
  if(mtx===198&&gT(198,mty)===T.FLAG)startFlag();
}

function snapGround(){const mh=mario.big?32:16;
  for(let dy=0;dy<48;dy++)if(collide(mario.x+2,mario.y+mh+dy,mario.w-4,1)){
    mario.y=Math.floor((mario.y+mh+dy)/16)*16-mh;mario.vy=0;mario.ground=true;return;}
  for(let dy=0;dy<48;dy++)if(!collide(mario.x+2,mario.y-dy,mario.w-4,mh)){mario.y-=dy;return;}}

function killMario(){
  if(mario.dead||mario.inv>0||mario.shrink>0)return;
  if(mario.big){
    // Shrink: big -> small, become invincible immediately
    const fy=mario.y+32;
    mario.big=false;mario.h=16;mario.y=fy-16;
    mario.shrink=40;
    mario.inv=160; // invincible for entire shrink animation (40 frames) + 120 frames after = ~2.7 seconds total
    sfxPowerdown();
    return;
  }
  mario.dead=true;mario.dt=0;mario.dv=-6;mario.vx=0;mario.vy=0;sfxDie();stopBGM();}

function startFlag(){stopBGM();flagSeq=true;flagTm=0;flagDn=true;flagY=mario.y;mario.vx=0;mario.vy=0;sfxFlag();
  score+=Math.max(0,12-Math.floor(mario.y/16))*100;}
function updateFlag(){flagTm++;const mh=mario.big?32:16;
  if(flagDn){mario.y+=2;flagY+=2;if(mario.y>=13*16-mh){mario.y=13*16-mh;flagDn=false;mario.face=1;}}
  else if(flagTm>60){autoWalk=true;flagSeq=false;}}

// --- Enemies ---
function updateEnemies(){
  if(mario.dead||flagSeq||autoWalk)return;
  enemies.forEach(e=>{
    if(!e.alive){if(e.stomped&&e.st>0){e.st++;if(e.st>30)e.stomped=false;}return;}
    if(e.x>cam.x+VIEW_W+32||e.x<cam.x-32)return;
    if(e.type==='koopa'&&e.shell){e.x+=e.sv;if(e.sv!==0)enemies.forEach(o=>{if(o===e||!o.alive)return;
      if(Math.abs(o.x-e.x)<14&&Math.abs(o.y-e.y)<14){o.alive=false;o.stomped=true;o.st=1;score+=100;}});}
    else e.x+=e.vx;
    if(!e.vy)e.vy=0;e.vy+=GRAVITY*.8;if(e.vy>MAX_FALL)e.vy=MAX_FALL;e.y+=e.vy;
    const ew=14,eh=16;
    if(collide(e.x+1,e.y+eh,ew-2,1)){e.y=Math.floor((e.y+eh)/16)*16-eh;e.vy=0;}
    if(e.y>LH*16+16){e.alive=false;return;}
    const mv=(e.type==='koopa'&&e.shell)?e.sv:e.vx;
    if(mv!==0){const cx=mv>0?e.x+ew:e.x-1;if(collide(cx,e.y+2,1,eh-4)){
      if(e.type==='koopa'&&e.shell)e.sv=-e.sv;else e.vx=-e.vx;}}
    if(mario.inv>0)return;
    const mh=mario.big?32:16,mx=mario.x+2,my=mario.y,mw=mario.w-4;
    if(e.type==='koopa'&&e.shell&&e.sv===0){
      if(mx+mw>e.x&&mx<e.x+ew&&my+mh>e.y+4&&my<e.y+eh){e.sv=(mario.x<e.x)?4:-4;sfxKick();score+=400;}return;}
    if(mx+mw>e.x+2&&mx<e.x+ew-2&&my+mh>e.y+4&&my<e.y+eh){
      if(mario.vy>0&&my+mh-mario.vy<=e.y+8){
        if(e.type==='goomba'){e.alive=false;e.stomped=true;e.st=1;}
        else if(e.type==='koopa'){if(!e.shell){e.shell=true;e.sv=0;e.y+=8;}else e.sv=(mario.x<e.x)?4:-4;}
        mario.vy=-5;sfxStomp();score+=100;
      }else killMario();}
  });}

// --- Items ---
function updateItems(){
  items.forEach((it,i)=>{
    if(it.type==='mushroom'){
      if(it.em<16){it.em++;it.y=it.ef-it.em;return;}
      it.x+=it.vx;it.vy=(it.vy||0)+GRAVITY;if(it.vy>MAX_FALL)it.vy=MAX_FALL;it.y+=it.vy;
      if(collide(it.x+2,it.y+16,12,1)){it.y=Math.floor((it.y+16)/16)*16-16;it.vy=0;}
      if(collide(it.vx>0?it.x+14:it.x,it.y+2,2,12))it.vx=-it.vx;
      if(it.y>LH*16){items.splice(i,1);return;}
      const mh=mario.big?32:16;
      if(mario.x+mario.w>it.x&&mario.x<it.x+16&&mario.y+mh>it.y&&mario.y<it.y+16&&!mario.dead){
        const fy=mario.y+mh;mario.big=true;mario.h=32;mario.y=fy-32;mario.grow=30;sfxPowerup();score+=1000;items.splice(i,1);}
    }});}

function updateParts(){
  coinAn=coinAn.filter(c=>{c.y+=c.vy;c.vy+=.3;c.t--;return c.t>0;});
  debris=debris.filter(d=>{d.x+=d.vx;d.y+=d.vy;d.vy+=GRAVITY;d.t--;return d.t>0;});
  bumps=bumps.filter(b=>{b.o+=b.v;b.v+=.5;if(b.o>=0){b.o=0;return false;}return true;});}
function updateCam(){const t=mario.x-VIEW_W*.35;if(t>cam.x)cam.x=t;cam.x=Math.max(0,Math.min(cam.x,LW*16-VIEW_W));}
function updateTime(){if(gs!=='playing'||mario.dead||flagSeq||autoWalk)return;tc++;if(tc>=24){tc=0;time--;if(time<=0)killMario();}}

// --- Drawing ---
function drawTile(tx,ty,t){
  const x=tx*16-cam.x,y=ty*16;if(x<-16||x>VIEW_W)return;
  let bo=0;bumps.forEach(b=>{if(b.x===tx&&b.y===ty)bo=b.o;});
  switch(t){
    case T.GROUND:ctx.fillStyle=C.ground1;ctx.fillRect(x,y+bo,16,16);ctx.fillStyle=C.ground2;
      if(ty===13){ctx.fillRect(x,y+bo,16,2);ctx.fillRect(x+4,y+2+bo,1,6);ctx.fillRect(x+12,y+2+bo,1,6);
        ctx.fillRect(x,y+8+bo,16,1);ctx.fillRect(x,y+9+bo,1,6);ctx.fillRect(x+8,y+9+bo,1,6);}
      else{ctx.fillRect(x,y+bo,16,1);ctx.fillRect(x,y+bo,1,16);ctx.fillStyle='#ac7c00';
        ctx.fillRect(x+4,y+3+bo,1,5);ctx.fillRect(x+12,y+3+bo,1,5);ctx.fillRect(x,y+8+bo,16,1);ctx.fillRect(x+8,y+10+bo,1,5);}break;
    case T.BRICK:ctx.fillStyle=C.brick;ctx.fillRect(x,y+bo,16,16);ctx.fillStyle=C.brickLight;ctx.fillRect(x,y+bo,16,1);ctx.fillRect(x,y+bo,1,16);
      ctx.fillStyle='#000';ctx.fillRect(x+7,y+1+bo,1,7);ctx.fillRect(x,y+7+bo,16,1);ctx.fillRect(x+3,y+8+bo,1,8);ctx.fillRect(x+11,y+8+bo,1,8);ctx.fillRect(x,y+15+bo,16,1);break;
    case T.QUESTION:{const q=Math.floor(fc/8)%4;ctx.fillStyle=q<2?C.question:C.questionDark;ctx.fillRect(x,y+bo,16,16);
      ctx.fillStyle='#000';ctx.fillRect(x,y+15+bo,16,1);ctx.fillRect(x+15,y+bo,1,16);ctx.fillStyle=C.brickLight;ctx.fillRect(x,y+bo,16,1);ctx.fillRect(x,y+bo,1,16);
      ctx.fillStyle='#000';ctx.fillRect(x+5,y+3+bo,6,2);ctx.fillRect(x+9,y+5+bo,2,3);ctx.fillRect(x+7,y+7+bo,3,2);ctx.fillRect(x+7,y+10+bo,2,2);break;}
    case T.Q_EMPTY:case T.B_EMPTY:ctx.fillStyle='#886830';ctx.fillRect(x,y+bo,16,16);ctx.fillStyle='#000';ctx.fillRect(x,y+15+bo,16,1);ctx.fillRect(x+15,y+bo,1,16);
      ctx.fillStyle='#ac9468';ctx.fillRect(x,y+bo,16,1);ctx.fillRect(x,y+bo,1,16);break;
    case T.PIPE_TL:ctx.fillStyle=C.pipe;ctx.fillRect(x-2,y,18,16);ctx.fillStyle=C.pipeHi;ctx.fillRect(x-2,y+2,4,14);ctx.fillStyle=C.pipeDark;ctx.fillRect(x+14,y+2,2,14);ctx.fillStyle='#000';ctx.fillRect(x-2,y,18,2);break;
    case T.PIPE_TR:ctx.fillStyle=C.pipe;ctx.fillRect(x,y,18,16);ctx.fillStyle=C.pipeHi;ctx.fillRect(x+2,y+2,2,14);ctx.fillStyle=C.pipeDark;ctx.fillRect(x+14,y+2,4,14);ctx.fillStyle='#000';ctx.fillRect(x,y,18,2);break;
    case T.PIPE_BL:ctx.fillStyle=C.pipe;ctx.fillRect(x,y,16,16);ctx.fillStyle=C.pipeHi;ctx.fillRect(x+2,y,2,16);ctx.fillStyle=C.pipeDark;ctx.fillRect(x+14,y,2,16);break;
    case T.PIPE_BR:ctx.fillStyle=C.pipe;ctx.fillRect(x,y,16,16);ctx.fillStyle=C.pipeHi;ctx.fillRect(x+2,y,2,16);ctx.fillStyle=C.pipeDark;ctx.fillRect(x+14,y,2,16);break;
    case T.STAIR:ctx.fillStyle='#c88c5c';ctx.fillRect(x,y,16,16);ctx.fillStyle='#e0a870';ctx.fillRect(x,y,16,1);ctx.fillRect(x,y,1,16);ctx.fillStyle='#906830';ctx.fillRect(x+15,y,1,16);ctx.fillRect(x,y+15,16,1);break;
    case T.FLAG:ctx.fillStyle='#080';ctx.fillRect(x+7,y,2,16);break;
    case T.FLAG_TOP:ctx.fillStyle='#080';ctx.fillRect(x+7,y,2,16);ctx.fillStyle='#0a0';ctx.fillRect(x+5,y,6,6);break;
    case T.CASTLE:ctx.fillStyle=C.castle;ctx.fillRect(x,y,16,16);ctx.fillStyle=C.castleDark;ctx.fillRect(x+7,y+1,1,7);ctx.fillRect(x,y+7,16,1);ctx.fillRect(x+3,y+8,1,8);ctx.fillRect(x+11,y+8,1,8);break;
  }}

function drawCloud(cx,cy,sz){const x=cx*16-cam.x*.5,y=cy*16;if(x<-48||x>VIEW_W+16)return;ctx.fillStyle=C.cloud;const w=sz===2?48:32;
  ctx.fillRect(x+8,y,w-16,4);ctx.fillRect(x+4,y+4,w-8,4);ctx.fillRect(x,y+8,w,8);ctx.fillRect(x+4,y+16,w-8,4);ctx.fillStyle=C.cloudSh;ctx.fillRect(x+4,y+16,w-8,2);}
function drawHill(hx,sz){const x=hx*16-cam.x,y=13*16;if(x<-80||x>VIEW_W+16)return;const h=sz==='b'?4:2,w=sz==='b'?5:3;
  ctx.fillStyle=C.hill;for(let r=0;r<h;r++)ctx.fillRect(x+r*16,y-(r+1)*16,((w-r)*2-1)*16,16);
  ctx.fillStyle=C.hillLt;const cx2=x+(w-1)*16+4;for(let r=0;r<h;r++)ctx.fillRect(cx2,y-(r+1)*16,4,16);}
function drawBush(bx,sz){const x=bx*16-cam.x,y=12*16;if(x<-48||x>VIEW_W+16)return;ctx.fillStyle=C.bush;const w=sz*16;
  ctx.fillRect(x,y,w,16);ctx.fillRect(x+4,y-4,w-8,4);ctx.fillStyle=C.bushLt;ctx.fillRect(x+4,y,4,16);ctx.fillRect(x+8,y-4,4,4);}

function drawMario(){
  if(mario.dead){drawPx(mario.x-cam.x,mario.y,MD,MP);return;}
  if(mario.inv>0&&Math.floor(fc/2)%2)return;
  if(mario.grow>0&&Math.floor(mario.grow/3)%2)return;
  if(mario.shrink>0&&Math.floor(mario.shrink/3)%2)return;
  const x=mario.x-cam.x,y=mario.y;
  if(mario.big){
    let sp;
    if(mario.fireTimer>0)sp=BF;
    else if(!mario.ground)sp=BJM;
    else if(Math.abs(mario.vx)>.3)sp=mario.wf===0?BS:BW;
    else sp=BS;
    if(mario.face===-1){ctx.save();ctx.scale(-1,1);drawPx2H(-(x+16),y,sp,MP);ctx.restore();}
    else drawPx2H(x,y,sp,MP);
  }else{
    let sp;
    if(mario.fireTimer>0)sp=MF;
    else if(!mario.ground)sp=MJ;
    else if(Math.abs(mario.vx)>.3)sp=mario.wf===0?MW1:MW2;
    else sp=MS;
    if(mario.face===-1){ctx.save();ctx.scale(-1,1);drawPx(-(x+12),y,sp,MP);ctx.restore();}
    else drawPx(x,y,sp,MP);
  }}

function drawFireballs(){
  fireballs.forEach(f=>{
    const x=f.x-cam.x,y=f.y;
    const frame=Math.floor(fc/2)%4;
    // Spinning fireball: rotating square pattern
    ctx.fillStyle=C.fire1;
    if(frame===0||frame===2){ctx.fillRect(x+1,y+1,6,6);ctx.fillStyle=C.fire3;ctx.fillRect(x+2,y+2,4,4);}
    else{ctx.fillRect(x,y,4,4);ctx.fillRect(x+4,y+4,4,4);ctx.fillStyle=C.fire3;ctx.fillRect(x+1,y+1,2,2);ctx.fillRect(x+5,y+5,2,2);}
    ctx.fillStyle=C.fire2;ctx.fillRect(x+3,y+3,2,2);
  });}

function drawEnemies(){enemies.forEach(e=>{const x=e.x-cam.x;if(x<-16||x>VIEW_W+16)return;
  if(e.type==='goomba'){if(e.stomped&&e.st>0)drawPx(x,e.y,GF,GP);else if(e.alive)drawPx(x,e.y,Math.floor(fc/8)%2===0?GS:GW,GP);}
  else if(e.type==='koopa'){if(e.shell)drawPx(x,e.y,KSH,KP);else if(e.alive)drawPx(x,e.y,KS,KP);}});}
function drawItems(){items.forEach(it=>{const x=it.x-cam.x;if(x<-16||x>VIEW_W+16)return;if(it.type==='mushroom')drawPx(x,it.y,MUSH_S,MUSH_P);});}
function drawCoins(){coinAn.forEach(c=>drawPx(c.x-cam.x,c.y,COIN_S,COIN_P));}
function drawDebris(){debris.forEach(d=>{const x=d.x-cam.x;ctx.fillStyle=C.brick;ctx.fillRect(x,d.y,6,6);ctx.fillStyle=C.brickLight;ctx.fillRect(x,d.y,6,1);ctx.fillRect(x,d.y,1,6);});}
function drawFlagP(){const x=198*16-cam.x;if(x<-16||x>VIEW_W+16)return;
  let fy=flagDn?Math.min(flagY,12*16):3*16;ctx.fillStyle=C.flag;ctx.fillRect(x-8,fy,10,10);ctx.fillStyle='#080';ctx.fillRect(x+7,2*16,2,11*16);}
function drawHUD(){ctx.fillStyle=C.text;ctx.font='8px monospace';
  ctx.fillText('MARIO',24,16);ctx.fillText(String(score).padStart(6,'0'),24,24);
  ctx.fillStyle=C.coin;ctx.fillRect(96,18,6,6);ctx.fillStyle=C.text;
  ctx.fillText('x'+String(coins).padStart(2,'0'),104,24);
  ctx.fillText('WORLD',145,16);ctx.fillText(' 1-1',145,24);
  ctx.fillText('TIME',200,16);ctx.fillText(' '+String(Math.max(0,time)).padStart(3,'0'),200,24);}

function drawLevel(){ctx.fillStyle=C.sky;ctx.fillRect(0,0,VIEW_W,VIEW_H);
  hills.forEach(h=>drawHill(h.x,h.s));clouds.forEach(c=>drawCloud(c.x,c.y,c.s));bushes.forEach(b=>drawBush(b.x,b.s));
  const s=Math.floor(cam.x/16),e=Math.ceil((cam.x+VIEW_W)/16)+1;
  for(let ty=0;ty<LH;ty++)for(let tx=s;tx<=e&&tx<LW;tx++){const t=gT(tx,ty);if(t)drawTile(tx,ty,t);}
  drawFlagP();drawItems();drawCoins();drawDebris();drawFireballs();drawEnemies();drawMario();drawHUD();}

function drawTitle(){ctx.fillStyle=C.sky;ctx.fillRect(0,0,VIEW_W,VIEW_H);
  ctx.fillStyle=C.question;ctx.font='bold 16px monospace';ctx.fillText('SUPER MARIO BROS.',40,60);
  ctx.font='8px monospace';ctx.fillStyle=C.text;ctx.fillText('WORLD 1-1 TRIBUTE',72,80);ctx.fillText('(C) PERSONAL USE ONLY',56,110);
  if(Math.floor(fc/20)%2){ctx.fillStyle=C.coin;ctx.fillText('PRESS ENTER TO START',56,150);}
  drawPx(120,170,MS,MP);ctx.fillStyle='#aaa';
  ctx.fillText('ARROWS:MOVE SPACE:JUMP',44,205);ctx.fillText('Z/SHIFT:FIRE  ENTER:START',36,217);}
function drawGO(){ctx.fillStyle='#000';ctx.fillRect(0,0,VIEW_W,VIEW_H);ctx.fillStyle=C.text;ctx.font='bold 12px monospace';
  ctx.fillText('GAME OVER',88,100);ctx.font='8px monospace';ctx.fillText('SCORE: '+String(score).padStart(6,'0'),80,130);
  if(Math.floor(fc/20)%2){ctx.fillStyle=C.coin;ctx.fillText('PRESS ENTER',88,170);}}
function drawWin(){
  drawLevel();
  winTimer++;

  // Phase 0: Time bonus countdown (frames 1-90ish)
  if(winPhase===0){
    if(winBonusTime>0&&winTimer%2===0){
      winBonusTime--;winBonusScore+=50;score+=50;
      if(winBonusTime%5===0)snd(800,.03,'square',.06);
    }
    if(winBonusTime<=0){winPhase=1;winTimer=0;}
  }
  // Phase 1: Pause then start music+fireworks (frame ~30)
  if(winPhase===1){
    if(!winMusicPlayed&&winTimer>20){playVictoryMusic();winMusicPlayed=true;}
    if(winTimer>30){winPhase=2;winTimer=0;}
  }
  // Phase 2: Fireworks show + text reveal
  if(winPhase===2){
    // Launch fireworks periodically
    if(winTimer%25===1&&fireworks.length<20){
      spawnFirework();
      // Firework launch sound
      snd(200+Math.random()*200,.1,'sine',.04);
    }
  }

  // Update & draw fireworks
  updateFireworks();
  drawFireworks();

  // Overlay
  const alpha=Math.min(winTimer*0.008,0.45);
  if(winPhase>=2)ctx.fillStyle=`rgba(0,0,0,${alpha})`;
  else ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.fillRect(0,0,VIEW_W,VIEW_H);

  // Time bonus display
  if(winPhase===0||winPhase===1){
    ctx.fillStyle=C.text;ctx.font='8px monospace';
    ctx.fillText('TIME x 50',88,90);
    ctx.fillStyle=C.coin;
    ctx.fillText(String(winBonusScore).padStart(6,'0'),88,104);
  }

  // COURSE CLEAR text (phase 2+)
  if(winPhase>=2){
    const textY=winTimer<30?80-(30-winTimer)*2:80;
    const textAlpha=Math.min(winTimer/20,1);

    // Glowing text effect
    const glow=Math.sin(fc*.08)*.3+.7;
    ctx.fillStyle=`rgba(252,152,56,${textAlpha*glow})`;
    ctx.font='bold 16px monospace';
    // Shadow
    ctx.fillText('COURSE CLEAR!',57,textY+1);
    ctx.fillStyle=`rgba(252,252,252,${textAlpha})`;
    ctx.fillText('COURSE CLEAR!',56,textY);

    if(winTimer>30){
      const fadeIn=Math.min((winTimer-30)/20,1);
      ctx.globalAlpha=fadeIn;
      ctx.fillStyle=C.text;ctx.font='8px monospace';
      ctx.fillText('SCORE: '+String(score).padStart(6,'0'),80,textY+30);
      ctx.fillText('COINS: '+String(coins).padStart(2,'0'),88,textY+44);
      ctx.fillText('TIME BONUS: '+String(winBonusScore),68,textY+58);
      ctx.globalAlpha=1;
    }

    if(winTimer>100&&Math.floor(fc/20)%2){
      ctx.fillStyle=C.coin;ctx.font='8px monospace';
      ctx.fillText('PRESS ENTER',88,textY+85);
    }
  }
}

// Fireworks particle system
function spawnFirework(){
  const fx=40+Math.random()*(VIEW_W-80);
  const fy=30+Math.random()*80;
  const colors=['#fc3030','#fcfc30','#30fc30','#3090fc','#fc30fc','#fcfcfc','#fc9838','#30fcfc'];
  const color1=colors[Math.floor(Math.random()*colors.length)];
  const color2=colors[Math.floor(Math.random()*colors.length)];
  const particles=[];
  const count=20+Math.floor(Math.random()*20);
  for(let i=0;i<count;i++){
    const angle=Math.PI*2*i/count+Math.random()*.3;
    const speed=1+Math.random()*2;
    particles.push({
      x:fx,y:fy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      color:Math.random()>.5?color1:color2,
      life:40+Math.floor(Math.random()*30),
      maxLife:40+Math.floor(Math.random()*30),
      size:1+Math.floor(Math.random()*2)
    });
  }
  // Burst sound
  setTimeout(()=>{snd(600+Math.random()*600,.08,'sine',.04);snd(400+Math.random()*400,.12,'triangle',.03);},0);
  fireworks.push({particles,timer:0});
}

function updateFireworks(){
  fireworks=fireworks.filter(fw=>{
    fw.timer++;
    fw.particles=fw.particles.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;
      p.vy+=0.04; // slight gravity
      p.vx*=0.98; // air resistance
      p.vy*=0.98;
      p.life--;
      return p.life>0;
    });
    return fw.particles.length>0;
  });
}

function drawFireworks(){
  fireworks.forEach(fw=>{
    fw.particles.forEach(p=>{
      const alpha=Math.min(p.life/p.maxLife*2,1);
      ctx.globalAlpha=alpha;
      ctx.fillStyle=p.color;
      // Sparkle effect: alternate size
      const s=p.size+(Math.floor(fc/2+p.life)%2);
      ctx.fillRect(Math.floor(p.x),Math.floor(p.y),s,s);
    });
  });
  ctx.globalAlpha=1;
}

function update(){fc++;if(gs==='playing'){updateMario();updateEnemies();updateItems();updateFireballs();updateParts();updateCam();updateTime();}}
function draw(){ctx.save();ctx.scale(SCALE,SCALE);
  switch(gs){case'title':drawTitle();break;case'playing':case'dead':drawLevel();break;case'gameover':drawGO();break;case'win':drawWin();break;}
  ctx.restore();}
function loop(){update();draw();requestAnimationFrame(loop);}
function resize(){const mw=window.innerWidth*.95,mh=window.innerHeight*.85,s=Math.max(1,Math.floor(Math.min(mw/VIEW_W,mh/VIEW_H)));
  canvas.style.width=VIEW_W*s+'px';canvas.style.height=VIEW_H*s+'px';}
window.addEventListener('resize',resize);resize();
gs='title';loop();
</script>
